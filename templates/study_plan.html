<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Plan Generator - Smart Study Tool</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* Animated Colorful Background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0; /* Add padding for scroll */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .form-container {
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 90%;
            max-width: 600px;
            animation: slideUp 0.6s ease-in-out;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            /* Gradient Text (Green/Teal Theme) */
            background: -webkit-linear-gradient(45deg, #43e97b, #38f9d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* Form Styles */
        form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Added Label Styles */
        label {
            display: block;
            text-align: left;
            font-weight: 600;
            color: #444;
            margin-bottom: -15px; /* Tightens space between label and input */
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            box-sizing: border-box; /* Fixes width issue */
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            background-color: #f9f9f9;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            /* Green/Teal focus color */
            border-color: #43e97b;
            background-color: #fff;
            box-shadow: 0 0 15px rgba(67, 233, 123, 0.4);
            outline: none;
        }

        input[type="date"] {
            color-scheme: light; /* Ensures date picker is light-themed */
        }

        button {
            /* Green/Teal Gradient Button */
            background: linear-gradient(45deg, #43e97b, #38f9d7);
            color: #444; /* Dark text for light button */
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(56, 249, 215, 0.5);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(56, 249, 215, 0.7);
        }

        /* Back to Home Button */
        .back-to-home {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #555;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-to-home:hover {
            color: #000;
            text-decoration: underline;
        }

        /* Error Message */
        .error-message {
            color: #c0392b;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 0; /* Form gap will space it */
            animation: fadeIn 0.5s ease-in-out;
            background: #fff0f0;
            padding: 10px 15px;
            border: 1px solid #e74c3c;
            border-radius: 12px;
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Create a Study Plan</h1>
        <form method="post">
            <label for="syllabus">Syllabus / Subject</label>
            <input type="text" id="syllabus" name="syllabus" placeholder="e.g., 'Physics 101'">
            
            <label for="topics">Key Topics</label>
            <input type="text" id="topics" name="topics" placeholder="e.g., 'Mechanics, Thermodynamics, Optics'">
            
            <label for="start_date">Start Date</label>
            <input type="date" id="start_date" name="start_date">
            
            <label for="deadline">Deadline</label>
            <input type="date" id="deadline" name="deadline">
            
            <button type="submit">Generate Plan</button>
        </form>
        
        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
        
        <!-- Back to Home Button -->
        <a href="/" class="back-to-home">← Back to Home</a>
    </div>
</body>
</html>
