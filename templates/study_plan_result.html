<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Study Plan - Slides</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Main Container */
        .result-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 90%;
            max-width: 800px;
            animation: slideUp 0.6s ease-in-out;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(45deg, #43e97b, #38f9d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* SLIDER STYLES */
        .slider-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            overflow: hidden; /* Hides overflow slides */
            position: relative;
            margin-bottom: 10px;
        }

        .slides-wrapper {
            display: flex; /* Horizontal layout */
            transition: transform 0.5s ease-in-out; /* Smooth sliding */
        }

        .slide {
            min-width: 100%; /* Each slide is 100% width */
            box-sizing: border-box;
            padding: 30px;
            text-align: left;
            min-height: 300px;
            display: flex;
            align-items: flex-start;
        }

        /* Preformatted text styling */
        .slide pre {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #34495e;
            white-space: pre-wrap; 
            margin: 0;
            width: 100%;
        }

        /* Navigation Controls */
        .slider-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #fcfcfc;
            border-top: 1px solid #eee;
        }

        .slide-counter {
            font-weight: bold;
            color: #555;
        }

        .nav-button {
            background: linear-gradient(45deg, #43e97b, #38f9d7);
            color: #444;
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(56, 249, 215, 0.4);
        }

        .nav-button:hover {
            transform: translateY(-2px);
        }

        .nav-button:disabled {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* Bottom Action Buttons */
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .action-button {
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease;
            min-width: 150px;
            text-align: center;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-button {
            background: linear-gradient(45deg, #a18cd1, #fbc2eb);
            box-shadow: 0 4px 15px rgba(161, 140, 209, 0.4);
        }

        .home-button {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }
        
        /* New Print Button Style */
        .print-button {
            /* Orange/Red Gradient */
            background: linear-gradient(45deg, #ff9966, #ff5e62);
            box-shadow: 0 4px 15px rgba(255, 94, 98, 0.4);
        }

        .action-button:hover {
            transform: translateY(-3px);
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ============================================================
           PRINT STYLES: This runs when you click "Save as PDF"
           ============================================================ */
        @media print {
            /* 1. Reset the Page Background */
            body {
                background: none;
                margin: 0;
                padding: 0;
                display: block;
                color: #000;
            }

            /* 2. Hide Navigation, Buttons, and Sliders Arrows */
            .slider-nav, .buttons-container, .nav-button {
                display: none !important;
            }

            /* 3. Reset the Container to be flat and full width */
            .result-container {
                box-shadow: none;
                border: none;
                background: none;
                width: 100%;
                max-width: 100%;
                padding: 0;
                margin: 0;
                animation: none;
            }

            h1 {
                -webkit-text-fill-color: black;
                color: black;
                border-bottom: 2px solid #333;
                padding-bottom: 10px;
                margin-bottom: 20px;
            }

            /* 4. UNPACK THE SLIDER (Crucial Step) */
            /* Make the slider container visible and vertically stacked */
            .slider-container {
                box-shadow: none;
                border: none;
                overflow: visible; /* Allow content to flow down */
                margin: 0;
            }

            /* Disable the horizontal flex layout */
            .slides-wrapper {
                display: block; 
                transform: none !important; /* Override JS transform */
            }

            /* Style each slide as a simple block of text */
            .slide {
                min-width: 100%;
                display: block;
                min-height: auto;
                padding: 20px 0;
                border-bottom: 1px solid #ccc; /* Separator line */
                page-break-inside: avoid; /* Try not to cut a day in half */
            }

            .slide pre {
                font-size: 12pt;
                color: black;
                white-space: pre-wrap;
            }
        }
    </style>
</head>
<body>
    <div class="result-container">
        <h1>Your Study Plan</h1>

        <div class="slider-container">
            <div class="slides-wrapper">
                {% for slide in plan_slides %}
                <div class="slide">
                    <pre>{{ slide }}</pre>
                </div>
                {% endfor %}
            </div>

            <div class="slider-nav">
                <button class="nav-button" id="prevBtn" disabled>← Previous</button>
                <span class="slide-counter" id="slideCounter">Day 1</span>
                <button class="nav-button" id="nextBtn">Next →</button>
            </div>
        </div>
        
        <div class="buttons-container">
            <a href="/study-plan" class="action-button back-button">← Create Another</a>
            
            <button onclick="window.print()" class="action-button print-button">🖨️ Save as PDF</button>
            
            <a href="/" class="action-button home-button">Back to Home</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const wrapper = document.querySelector('.slides-wrapper');
            const slides = document.querySelectorAll('.slide');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('slideCounter');
            
            let currentIndex = 0;
            const totalSlides = slides.length;

            function updateSlider() {
                // Move the wrapper using CSS transform
                wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
                
                // Update text
                counter.textContent = `Day ${currentIndex + 1} of ${totalSlides}`;
                
                // Handle button states
                prevBtn.disabled = (currentIndex === 0);
                nextBtn.disabled = (currentIndex === totalSlides - 1);
            }

            nextBtn.addEventListener('click', () => {
                if (currentIndex < totalSlides - 1) {
                    currentIndex++;
                    updateSlider();
                }
            });

            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateSlider();
                }
            });

            // Initialize
            updateSlider();
        });
    </script>
</body>
</html>
