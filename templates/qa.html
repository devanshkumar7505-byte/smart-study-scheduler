<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Answering</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* Animated Colorful Background (Same as Index) */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .form-container {
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 90%;
            max-width: 600px;
            animation: slideUp 0.6s ease-in-out;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #2c3e50;
            text-align: center;
            font-weight: 800;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* Form Styles */
        form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Input & Textarea Styling */
        textarea, input {
            width: 100%; /* Full width */
            box-sizing: border-box; /* Ensures padding doesn't break layout */
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            background-color: #f9f9f9;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        textarea:focus, input:focus {
            border-color: #4facfe;
            background-color: #fff;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 180px;
        }

        /* Gradient Button */
        button {
            /* Cool Blue/Purple Gradient */
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: #ffffff;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.6);
        }

        /* Back to Home Button */
        .back-to-home {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #555;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-to-home:hover {
            color: #000;
            text-decoration: underline;
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Question Answering</h2>
        <form method="post" action="/answer-question">
            <textarea name="context" placeholder="Paste your text or article here..."></textarea>
            <input type="text" name="question" placeholder="What do you want to know?">
            <button type="submit">Get Answer</button>
        </form>
        <a href="/" class="back-to-home">← Back to Home</a>
    </div>
</body>
</html>
