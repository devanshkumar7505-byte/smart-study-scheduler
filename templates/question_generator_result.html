<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Questions - Smart Study Tool</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            /* Animated Colorful Background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-container {
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 90%;
            max-width: 700px;
            animation: slideUp 0.6s ease-in-out;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            /* Gradient Text to match buttons */
            background: -webkit-linear-gradient(45deg, #e73c7e, #ee7752);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-align: center;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 30px 0; /* Bottom margin for spacing from buttons */
        }

        li {
            background-color: #ffffff;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            /* Warm accent color for questions */
            border-left: 5px solid #e73c7e; 
            font-size: 1.1rem;
            color: #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
            animation: fadeIn 0.5s ease-in-out;
            border: 1px solid #f0f0f0;
        }
        
        li:hover {
            transform: translateX(5px); /* Subtle movement on hover */
            border-left-color: #ee7752;
        }

        li:last-child {
            margin-bottom: 0;
        }

        /* Buttons Container */
        .buttons-container {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Button Styles */
        .back-button, .home-button {
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            flex: 1;
            min-width: 150px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Specific Gradients */
        .back-button {
            /* Warm Pink/Orange Gradient */
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            color: #555;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
        }

        .home-button {
            /* Cool Blue Gradient */
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }

        .back-button:hover, .home-button:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Animations */
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="result-container">
        <h1>Generated Questions</h1>
        <ul>
            {% for question in questions %}
                <li>{{ question }}</li>
            {% endfor %}
        </ul>
        <div class="buttons-container">
            <a href="/question-generator" class="back-button">← Generate More</a>
            <a href="/" class="home-button">Back to Home</a>
        </div>
    </div>
</body>
</html>
